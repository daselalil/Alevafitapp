*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background-color:var(--bg);
  background-image:var(--texture);
  background-size:500px auto;
  background-repeat:repeat;
  font-family:var(--mono);color:var(--text);min-height:100vh;overscroll-behavior:none;
}
button{-webkit-appearance:none;cursor:pointer;font-family:'Neue Montreal','DM Sans',sans-serif;}
input,select,textarea{font-family:'Neue Montreal','DM Sans',sans-serif;outline:none;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:opacity(0.4);}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);}
#onboarding{position:fixed;inset:0;background:transparent;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;overflow:hidden;}
#onboarding.hide{animation:slideOut 0.4s ease forwards;}
@keyframes slideOut{to{opacity:0;transform:translateY(-20px);}}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fi 0.2s ease;}
#header{background-color:var(--card);border-bottom:1px solid var(--border2);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(100,100,110,0.1);}
#nav-bar{display:flex;background-color:var(--card);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -1px 12px rgba(0,0,0,0.06);}
.page{display:none;padding:16px 16px 90px;max-width:600px;margin:0 auto;}
.page.active{display:block;}
</style>

  var res=await sb.auth.signUp({email:email,password:password,options:{data:{username:username,display_name:displayName}}});
  if(!res.error&&res.data&&res.data.user)sbUser=res.data.user;
  return res;
}
async function sbSignIn(email,password){
  if(!sb)return {error:{message:"Supabase not loaded"}};
  var res=await sb.auth.signInWithPassword({email:email,password:password});
  if(!res.error&&res.data&&res.data.user)sbUser=res.data.user;
  return res;
}
async function sbSignOut(){
  if(!sb)return;
  await sb.auth.signOut();
  sbUser=null;
}
async function sbCheckUsername(username){
  if(!sb)return true;
  try{
    var res=await sb.rpc("check_username",{uname:username});
    if(res.error){console.log("Username check error:",res.error.message);return true;}
    return res.data===true;
  }catch(e){console.log("Username check failed:",e);return true;}
}
async function sbGetProfile(){
  if(!sb||!sbUser)return null;
  var res=await sb.from("profiles").select("*").eq("id",sbUser.id).single();
  return res.data;
}
async function sbUpdateProfile(data){
  if(!sb||!sbUser)return;
  await sb.from("profiles").update(data).eq("id",sbUser.id);
}
async function sbGetLeaderboard(){
  if(!sb)return [];
  var res=await sb.from("leaderboard").select("*").limit(50);
  return res.data||[];
}
async function sbLogWorkout(exercise,weight,reps,setsCount,dayName,date){
  if(!sb||!sbUser)return;
  await sb.from("workout_logs").insert({user_id:sbUser.id,exercise:exercise,weight:weight,reps:String(reps),sets_count:setsCount,day_name:dayName,logged_date:date});
}
async function sbRestoreSession(){
  if(!sb)return;
  var res=await sb.auth.getSession();
  if(res.data&&res.data.session)sbUser=res.data.session.user;
}

// Only exercises with published data from ExRx Weightlifting Performance Standards
// Values are [untrained, novice, intermediate, advanced, elite] bodyweight multipliers (1RM)
// Ages 18-39 baseline. Age adjustment applied in getStrengthLevel()
// Sources: ExRx.net, NSCA Essentials of Strength Training & Conditioning (4th Ed.)
const STR_STD={
  "Bench Press":         {m:[0.50,0.75,1.00,1.25,1.50],  f:[0.25,0.50,0.75,1.00,1.25]},
  "Squat":               {m:[0.75,1.00,1.50,2.00,2.50],  f:[0.50,0.75,1.00,1.50,2.00]},

  "Shoulder Press":      {m:[0.35,0.50,0.70,0.90,1.15],  f:[0.20,0.30,0.45,0.60,0.80]},
  "Military Press":      {m:[0.35,0.50,0.70,0.90,1.15],  f:[0.20,0.30,0.45,0.60,0.80]},
  "Overhead Press":      {m:[0.35,0.50,0.70,0.90,1.15],  f:[0.20,0.30,0.45,0.60,0.80]},
  "Power Clean":         {m:[0.50,0.75,1.00,1.25,1.50],  f:[0.35,0.50,0.70,0.90,1.10]},
  "Power Snatch":        {m:[0.35,0.55,0.75,1.00,1.20],  f:[0.25,0.38,0.53,0.70,0.85]},
};
const STR_LEVELS=["Bronze","Silver","Gold","Platinum","Diamond"];
const STR_COLORS=["#c4956a","#a8a8b0","#d4af37","#c0c5ce","#b8d4e8"];

function getStrengthLevel(exercise,weightLifted){
  if(!profile||!profile.currentWeight||!weightLifted)return null;
  var bw=parseFloat(profile.currentWeight)||70;
  if(profile.unit==="lbs")bw=bw/2.205;
  var liftKg=parseFloat(weightLifted)||0;
  if(profile.unit==="lbs")liftKg=liftKg/2.205;
  var std=STR_STD[exercise];
  if(!std)return null;
  var isFemale=profile.sex==="female";
  var thresholds=isFemale?std.f:std.m;
  // Age adjustment (ExRx age brackets: 18-39 baseline, 40-49, 50-59, 60-69)
  var age=parseInt(profile.age)||25;
  var ageFactor=1.0;
  if(age>=60)ageFactor=0.76;
  else if(age>=50)ageFactor=0.84;
  else if(age>=40)ageFactor=0.92;
  // Adjust thresholds down for older lifters (lower bar to reach each level)
  var adjusted=thresholds.map(function(t){return t*ageFactor;});
  var ratio=liftKg/bw;
  var level=0;
  for(var i=0;i<adjusted.length;i++){if(ratio>=adjusted[i])level=i;}
  return {level:level,label:STR_LEVELS[level],color:STR_COLORS[level],ratio:Math.round(ratio*100)/100,nextThreshold:level<4?Math.round(adjusted[level+1]*bw):null,nextLabel:level<4?STR_LEVELS[level+1]:null};
}

  var vCancel=mk("button","");vCancel.style.cssText="padding:14px 28px;background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:30px;font-size:13px;font-family:'Neue Montreal','DM Sans',sans-serif;cursor:pointer;";

  document.body.appendChild(vov);

    var t="";

    vText.textContent=t||"...";

  rec.onerror=function(e){
    if(cancelled)return;
    vStat.textContent=(appSettings.language==="es"?"Error: ":"Error: ")+e.error;

// Parse voice command for workout logging e.g. "4 sets of 10 bench press" or "3 by 12 squats"
function parseWorkoutVoice(text){
  var results=[];
  // Split by common separators  "and", "then", commas
  var parts=text.split(/,| and | then | y | luego /i).map(function(s){return s.trim();}).filter(Boolean);
  parts.forEach(function(part){
    var lower=part.toLowerCase();
    var sets=null,reps=null,name=null;
    // Pattern 1: "4 sets of 10 bench press", "4 sets of 10 reps bench press"
    var m=lower.match(/(\d+)\s*(?:sets?|series|sets of|x|by|por|de)\s*(?:of\s*)?(\d+)\s*(?:reps?|repeticiones|repeats)?\s*(?:of\s*)?(.+)/);
    if(m){sets=parseInt(m[1]);reps=parseInt(m[2]);name=m[3];}
    else {
      // Pattern 2: "bench press 4 sets 10 reps"
      m=lower.match(/(.+?)\s+(\d+)\s*(?:sets?|x|por|de)\s*(\d+)/);
      if(m){name=m[1];sets=parseInt(m[2]);reps=parseInt(m[3]);}
    }
    // Pattern 3: "4x10 bench press" or "3x12 squats"
    if(!m){m=lower.match(/(\d+)\s*x\s*(\d+)\s+(.+)/);if(m){sets=parseInt(m[1]);reps=parseInt(m[2]);name=m[3];}}
    if(name){
      // Clean exercise name and match to library
      name=name.replace(/\b(of|reps?|sets?|the|a|an|de|la|el)\b/g,"").trim();
      var matched=findExerciseInLib(name);
      if(matched) results.push({name:matched,sets:sets||3,reps:reps||10});
    }
  });
  return results;
}

function findExerciseInLib(query){
  query=query.toLowerCase().trim();
  var all=[];
  for(var c in LIB) LIB[c].forEach(function(ex){all.push(ex);});
  // Exact match
  var exact=all.find(function(ex){return ex.toLowerCase()===query;});
  if(exact) return exact;
  // Contains match
  var contains=all.find(function(ex){return ex.toLowerCase().includes(query);});
  if(contains) return contains;
  // Reverse contains (query contains exercise)
  var reverse=all.find(function(ex){return query.includes(ex.toLowerCase());});
  if(reverse) return reverse;
  // Word-by-word match
  var qWords=query.split(/\s+/);
  var best=null,bestScore=0;
  all.forEach(function(ex){
    var exWords=ex.toLowerCase().split(/\s+/);
    var score=0;
    qWords.forEach(function(w){if(exWords.indexOf(w)>=0)score++;});
    if(score>bestScore){bestScore=score;best=ex;}
  });
  return bestScore>0?best:null;
}

  var cats={};
  exercises.forEach(function(ex){var c=catOf(ex);if(c&&!cats[c])cats[c]=true;});
  var seen={},result=[];
  Object.keys(cats).forEach(function(c){
    (WARMUPS[c]||[]).forEach(function(w){
      if(!seen[w.name]){seen[w.name]=true;result.push(w);}
    });
  });
  return result;
}

function openFullCalendar(){
  var existing=document.getElementById("full-calendar-ov");
  if(existing)existing.remove();

  var history=[];try{history=JSON.parse(localStorage.getItem(HK)||"[]");}catch(e){}
  var todayStr=S.date||tod();
  var workedDates=new Set(history.map(function(h){return h.date;}));
  var todayExes=S.dayEx[dayName()]||[];
  var todayHasLog=todayExes.some(function(ex){return(S.logs[dayName()+"__"+ex]||[]).filter(function(s){return s.d===todayStr&&s.r;}).length>0;});
  if(todayHasLog)workedDates.add(todayStr);

  // Streak calculation
  function calcStreak(dates){
    if(!dates.size)return{current:0,best:0};
    var today2=new Date(todayStr);today2.setHours(0,0,0,0);
    var current=0;
    var check=new Date(today2);
    if(!dates.has(todayStr))check.setDate(check.getDate()-1);
    while(true){var iso=check.toISOString().split("T")[0];if(dates.has(iso)){current++;check.setDate(check.getDate()-1);}else break;}
    var best=0,run=0,prev=null;
    Array.from(dates).map(function(d){return new Date(d);}).sort(function(a,b){return a-b;}).forEach(function(d){
      if(prev){var diff=(d-prev)/(86400000);if(diff===1)run++;else run=1;}else run=1;
      if(run>best)best=run;prev=d;
    });
    return{current:current,best:best};
  }
  var streak=calcStreak(workedDates);

function joinRoutine(code){
  const item=sharedState.inboxItems.find(x=>x.code===code);
  if(!item)return;
  item.joined=true;
  const already=sharedState.joinedRoutines.find(x=>x.code===code);
  if(!already){sharedState.joinedRoutines.unshift({...item,myLogs:{}});}
  persistShared();
}

function renderJoinedDetail(){
  const routine=sharedState.joinedRoutines.find(x=>x.code===sharedState.activeJoined);
  if(!routine){renderSharedPage();return;}

  const st=STRETCHES[stretchSt.currentIdx];
  const total=STRETCHES.length;
  const td=tod();
  if(stretchSt.lastDate!==td){stretchSt.done=[];stretchSt.lastDate=td;}
  const doneCount=stretchSt.done.length,allDone=doneCount===total;

  // Header
  const hdr=mk("div","display:flex;align-items:center;gap:12px;margin-bottom:18px;");
  const ht=mk("div");
  ht.appendChild(mk("div","font-size:15px;font-weight:700;color:#7a9aaa;letter-spacing:4px;","NECK ROUTINE"));

  const pbBg=mk("div","width:100%;height:3px;background:#1a1a1a;");

  if(allDone){
    const done=mk("div","text-align:center;padding:36px 0;");

// ===================== LOG ACTIONS =====================
function calcCalorieTarget(){
  if(!profile||!profile.currentWeight) return null;
  var wkg=parseFloat(profile.currentWeight)||70;
  if(profile.unit==="lbs") wkg=wkg/2.205;
  if(wkg<30)wkg=30;if(wkg>300)wkg=300;
  var hcm=parseFloat(profile.height)||170;
  if(profile.heightUnit==="ft"){var pts=(profile.height||"").split("'");hcm=((parseFloat(pts[0])||5)*30.48)+((parseFloat(pts[1])||7)*2.54);}
  if(profile.heightUnit==="in") hcm=(parseFloat(profile.height)||67)*2.54;
  if(hcm<100)hcm=100;if(hcm>250)hcm=250;
  var age=parseFloat(profile.age)||25;
  if(age<13)age=13;if(age>100)age=100;
  var isMale=profile.sex==="male";
  // Mifflin-St Jeor BMR
  var bmr=isMale?(10*wkg+6.25*hcm-5*age+5):(10*wkg+6.25*hcm-5*age-161);
  // Activity factor: moderate (working out)
  var tdee=Math.round(bmr*1.55);
  var bc=profile.bodyComp||"medium";
  var exp=profile.experience||"beginner";
  var trained=(exp==="intermediate"||exp==="advanced");
  var wlbs=wkg*2.205;
  var target,lo,hi,note="",proMin=0;
  if(bc==="lean"&&!trained){lo=tdee+300;hi=tdee+1000;target=Math.round((lo+hi)/2);note="Surplus: +300 to 1,000 kcal";}
  else if(bc==="lean"&&trained){lo=tdee+100;hi=tdee+300;target=Math.round((lo+hi)/2);note="Surplus: +100 to 300 kcal";}
  else if(bc==="higher"&&!trained){lo=Math.round(tdee*0.80);hi=Math.round(tdee*0.85);target=Math.round((lo+hi)/2);proMin=Math.round(wlbs*1.0);note="Cut 15-20% · "+proMin+"g+ protein";}
  else if(bc==="higher"&&trained){lo=Math.round(tdee*0.85);hi=Math.round(tdee*0.85);target=lo;proMin=Math.round(wlbs*1.2);note="Cut 15% · "+proMin+"g+ protein";}
  else if(bc==="medium"&&!trained){lo=tdee;hi=tdee+500;target=Math.round((lo+hi)/2);note="Moderate surplus: +0 to 500 kcal";}
  else{lo=tdee;hi=tdee+200;target=Math.round((lo+hi)/2);note="Moderate surplus: +0 to 200 kcal";}
  return {tdee:tdee,target:target,lo:lo,hi:hi,note:note,proMin:proMin};
}
function calcStats(){
  const d=data();if(d.length<2)return null;
  const ws=d.map(x=>x.w),mx=Math.max(...ws),mn=ws[0],ls=ws[ws.length-1];
  const g=+(ls-mn).toFixed(1),p=mn>0?((g/mn)*100).toFixed(1):0;
  return{max:mx,last:ls,gain:g,pct:p};
}
function doLog(){
  const w=parseFloat(S.wt);if(!w||!S.date||!S.sel)return;
  const key=dayName()+"__"+S.sel,entry={d:S.date,w:w};
  S.logs[key]=[...(S.logs[key]||[]).filter(x=>x.d!==S.date),entry].sort((a,b)=>a.d.localeCompare(b.d));
  S.wt="";persist();renderLogPage();
  setTimeout(()=>{document.querySelectorAll("button").forEach(b=>{if(b.textContent==="+ LOG IT"){b.textContent="✓ LOGGED";b.style.background="#1a3a1a";b.style.color="#4dff4d";}});},10);
  setTimeout(()=>renderLogPage(),1400);
}
function doDelete(date){
  const key=dayName()+"__"+S.sel;
  S.logs[key]=(S.logs[key]||[]).filter(x=>x.d!==date);
  persist();renderLogPage();
}

// ===================== CHART =====================
function drawChart(canvas,d,color){
  const ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  const pad={t:12,r:12,b:28,l:34},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  const ws=d.map(x=>x.w),minW=Math.min(...ws)-10,maxW=Math.max(...ws)+20,rng=maxW-minW||1;
  function xp(i){return pad.l+(i/(d.length-1||1))*cW;}
  function yp(w){return pad.t+cH-((w-minW)/rng)*cH;}
  ctx.strokeStyle="#d5ccc5";ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.t+(i/4)*cH;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cW,y);ctx.stroke();}
  ctx.strokeStyle=color+"33";ctx.setLineDash([4,4]);
  const pkY=yp(Math.max(...ws));ctx.beginPath();ctx.moveTo(pad.l,pkY);ctx.lineTo(pad.l+cW,pkY);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle="#a89898";ctx.font="9px 'Courier New'";ctx.textAlign="right";
  for(let i=0;i<=4;i++){const val=minW+(i/4)*rng,y=pad.t+cH-(i/4)*cH;ctx.fillText(Math.round(val),pad.l-3,y+3);}
  ctx.textAlign="center";const step=d.length>6?Math.ceil(d.length/6):1;
  d.forEach((x,i)=>{if(i%step===0||i===d.length-1)ctx.fillText(x.d.slice(5),xp(i),H-5);});
  ctx.save();ctx.beginPath();d.forEach((x,i)=>{i===0?ctx.moveTo(xp(i),yp(x.w)):ctx.lineTo(xp(i),yp(x.w));});
  ctx.lineTo(xp(d.length-1),pad.t+cH);ctx.lineTo(xp(0),pad.t+cH);ctx.closePath();
  const g=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);g.addColorStop(0,color+"33");g.addColorStop(1,color+"00");
  ctx.fillStyle=g;ctx.fill();ctx.restore();
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin="round";ctx.beginPath();
  d.forEach((x,i)=>{i===0?ctx.moveTo(xp(i),yp(x.w)):ctx.lineTo(xp(i),yp(x.w));});ctx.stroke();
  d.forEach((x,i)=>{ctx.beginPath();ctx.arc(xp(i),yp(x.w),4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
  const lx=xp(d.length-1),ly=yp(d[d.length-1].w);
  ctx.beginPath();ctx.arc(lx,ly,5,0,Math.PI*2);ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
}

// ===================== WORKOUT SESSION =====================
let WS = {
  active: false,
  startTime: null,
  accumulated: 0,
  paused: false,
  timerRef: null,
  restTimerRef: null,
  restSecondsLeft: 0,
  restingEx: null,
};

function fmtTime(secs){
  const m=Math.floor(secs/60),s=secs%60;
  return m+":"+(s<10?"0"+s:s);
}
function fmtLCD(secs){
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
  if(h>0) return h+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
  return (m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
}
function wsElapsed(){
  if(!WS.startTime) return WS.accumulated;
  return WS.accumulated+Math.floor((Date.now()-WS.startTime)/1000);
}

function openWorkoutSession(){
  WS.active=true;
  renderWorkoutSession();
}

function hideWorkoutSession(){
  const ov=document.getElementById("workout-session");
  if(ov){ov.style.animation="slideOut 0.3s ease forwards";setTimeout(()=>ov.remove(),300);}
  renderLogPage();
}

function startWorkoutTimer(){
  WS.startTime=Date.now();
  WS.paused=false;
  if(WS.timerRef)clearInterval(WS.timerRef);
  WS.timerRef=setInterval(updateTimerDisplay,1000);
  renderWorkoutSession();
}

function pauseWorkoutTimer(){
  if(!WS.startTime) return;
  WS.accumulated+=Math.floor((Date.now()-WS.startTime)/1000);
  WS.startTime=null;
  WS.paused=true;
  if(WS.timerRef){clearInterval(WS.timerRef);WS.timerRef=null;}
  renderWorkoutSession();
}

function saveWorkoutHistory(){
  // Collect all exercises + sets for the current day that have at least one logged set
  const day = dayName();
  const exercises = S.dayEx[day] || [];
  const entries = [];
  exercises.forEach(ex => {
    const sets = S.logs[day + "__" + ex] || [];
    if(sets.length > 0) entries.push({name: ex, sets: sets.map(s=>({kg:s.kg,reps:s.reps}))});
  });
  if(entries.length === 0) return; // nothing to save
  try {
    const history = JSON.parse(localStorage.getItem(HK) || "[]");
    history.push({date: S.date, day, entries, savedAt: Date.now()});
    localStorage.setItem(HK, JSON.stringify(history));
  } catch(e) {}
}

function closeWorkoutSession(){
  saveWorkoutHistory();
  var duration=wsElapsed();
  WS.active=false;
  WS.startTime=null;

  WS.paused=false;

  if(ov){ov.style.animation="slideOut 0.3s ease forwards";setTimeout(()=>ov.remove(),300);}

  dExs.forEach(function(ex){if((S.logs[dayName()+"__"+ex]||[]).length>0)hasLogs=true;});

    toast.innerHTML='<div style="font-size:22px;font-weight:800;margin-bottom:2px;">~'+cals+' kcal burned 🔥</div><div style="font-size:11px;opacity:0.6;">'+mins+' min session · estimated</div>';
    document.body.appendChild(toast);
    setTimeout(function(){toast.style.transition="opacity 0.5s";toast.style.opacity="0";setTimeout(function(){toast.remove();},500);},4000);
  }
}

function estimateCaloriesBurned(durationSeconds){
  if(!profile)return null;
  var wkg=parseFloat(profile.currentWeight)||70;
  if(profile.unit==="lbs") wkg=wkg/2.205;
  var mins=durationSeconds/60;
  if(mins<0.5) return 0;
  // Categorize workout by exercises in today's session
  var day=dayName();
  var exList=S.dayEx[day]||[];
  var plyoCount=0,strengthCount=0;
  exList.forEach(function(ex){
    if((LIB.PLYO||[]).includes(ex)) plyoCount++;
    else strengthCount++;
  });
  // Determine workout type: HIIT if mostly plyo, cardio if mixed, strength otherwise
  var met=6.0,typeFactor=0.9; // strength defaults
  if(plyoCount>0&&plyoCount>=strengthCount){met=8.5;typeFactor=1.5;} // HIIT
  else if(plyoCount>0){met=6.0;typeFactor=1.2;} // cardio mix
  // Gender factor — default to female (1.0) if not provided
  var sex=(profile.sex||"").toLowerCase();
  var genderFactor=(sex==="male"||sex==="m")?1.1:1.0;
  // SmartFit AI formula: (MET × 3.5 × weight_kg / 200) × duration_minutes
  var cals=Math.round((met*3.5*wkg/200)*mins*typeFactor*genderFactor);
  return cals;
}

// ===================== CALENDAR =====================
let calendarOpen = false;

function renderCalendarStrip(smooth){
  // Remove existing strip if any
  const existing = document.getElementById("week-calendar");
  const oldScroll = existing ? existing.scrollLeft : null;
  if(existing) existing.remove();

  const cal = mk("div","");
  cal.id = "week-calendar";
  cal.style.cssText = "background:var(--card);border-bottom:1px solid var(--border);padding:14px 0 20px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;align-items:flex-start;scroll-snap-type:x mandatory;";
  cal.style.msOverflowStyle = "none";
  cal.style.scrollbarWidth = "none";

  const today = new Date();
  const offsets = [];
  for(var oi=-14;oi<=365;oi++) offsets.push(oi);
  const dayNames = ["S","M","T","W","T","F","S"];
  let todayCol = null;
  const activeDate = S.date || today.toISOString().split("T")[0];

  offsets.forEach((offset) => {
    const d = new Date(today);
    d.setDate(today.getDate() + offset);
    const dateNum = d.getDate();
    const isToday = offset === 0;
    const isFuture = offset > 0;
    const dow = d.getDay();

    const dateStr = d.toISOString().split("T")[0];
    const isActive = dateStr === activeDate;
    const hasWorkout = Object.values(S.logs).some(entries =>
      entries.some(e => e.d === dateStr && e.r)
    );
    const dayLbl = dayNames[dow];

    const col = mk("div","");
    col.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:48px;flex-shrink:0;transition:transform 0.1s,opacity 0.1s;scroll-snap-align:center;";

    const circle = mk("div","");
    let bg;
    let borderStyle = "2px solid transparent";
    if(hasWorkout){ bg = "#a8b5a0"; }
    else if(isActive){ bg = "var(--card)"; borderStyle = "2px solid var(--navy)"; }
    else if(isFuture){ bg = "var(--bg3)"; }
    else { bg = "var(--bg2)"; }

    circle.style.cssText = "width:36px;height:36px;border-radius:50%;background:"+bg+";border:"+borderStyle+";display:flex;align-items:center;justify-content:center;transition:transform 0.15s;";

    if(hasWorkout){
      circle.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16"><polyline points="3,8 6.5,12 13,4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    } else {
      const numEl = mk("span","");
      numEl.style.cssText = "font-size:13px;font-weight:600;color:"+(isActive?"var(--navy)":"var(--text3)")+";font-family:'Neue Montreal','DM Sans',sans-serif;";
      numEl.textContent = dateNum;
      circle.appendChild(numEl);
    }

    const lbl = mk("div","");
    lbl.style.cssText = "font-size:10px;color:"+(isActive?"var(--navy)":"var(--text3)")+";font-weight:"+(isActive?"700":"400")+";font-family:'Neue Montreal','DM Sans',sans-serif;letter-spacing:0.5px;";
    lbl.textContent = dayLbl;

    col.appendChild(circle);
    col.appendChild(lbl);

    if(isActive) todayCol = col;

    ((_d,_col)=>{
      col.onclick = ()=>{
            const targetDate = _d.toISOString().split("T")[0];
            const targetDow = _d.getDay();
            const dowMap = {0:6, 1:0, 2:1, 3:2, 4:3, 5:4, 6:5};
            const dayIdx = dowMap[targetDow];
            S.day = dayIdx;
            S.date = targetDate;
            S.sel = (S.dayEx[DAYS[dayIdx].f]||[])[0]||null;
            S.picker = false;
            S._calNav = true;
            currentPage = "log";
            renderNav();
            renderCalendarStrip(true);
            renderLogPage();
          };
    })(d,col);

    cal.appendChild(col);
  });

  // Collect all day columns for curve effect
  const dayCols = Array.from({length: offsets.length}, (_,i) => cal.children[i]);

  function applyCurve(){
    const calRect = cal.getBoundingClientRect();
    const centerX = calRect.left + calRect.width / 2;
    dayCols.forEach(c => {
      if(!c) return;
      const cRect = c.getBoundingClientRect();
      const colCenter = cRect.left + cRect.width / 2;
      const dist = Math.abs(colCenter - centerX);
      const maxDist = calRect.width / 2;
      const norm = Math.min(dist / maxDist, 1);
      const yOff = norm * norm * 12;
      const sc = 1 - norm * 0.08;
      c.style.transform = "translateY("+yOff+"px) scale("+sc.toFixed(3)+")";
      c.style.opacity = (1 - norm * 0.3).toFixed(2);
    });
  }

  cal.addEventListener("scroll", applyCurve, {passive: true});

  // Insert after header
  const header = document.getElementById("header");
  header.parentNode.insertBefore(cal, header.nextSibling);
  // Hide scrollbar via style tag
  if(!document.getElementById("hide-cal-scrollbar")){
    const st=document.createElement("style");st.id="hide-cal-scrollbar";
    st.textContent="#week-calendar::-webkit-scrollbar{display:none;}";
    document.head.appendChild(st);
  }
  // Center active day
  if(todayCol){
    setTimeout(()=>{
      const scrollTo=todayCol.offsetLeft - cal.offsetWidth/2 + todayCol.offsetWidth/2;
      if(smooth && oldScroll!==null){
        cal.scrollLeft=oldScroll;
        cal.scrollTo({left:scrollTo,behavior:"smooth"});
      } else {
        cal.scrollLeft=scrollTo;
      }
      applyCurve();
    },0);
  }
}

      const today = new Date();
      // Build array centered on today: 3 days before, today, 3 days after = 7 days
      const offsets = [-3, -2, -1, 0, 1, 2, 3];
      const dayNames = ["S","M","T","W","T","F","S"];

      offsets.forEach((offset, i) => {
        const d = new Date(today);
        d.setDate(today.getDate() + offset);
        const dateNum = d.getDate();
        const isToday = offset === 0;
        const isFuture = offset > 0;
        const dow = d.getDay();

        // Check if user worked out on this day
        const dateStr = d.toISOString().split("T")[0];
        const hasWorkout = Object.values(S.logs).some(entries =>
          entries.some(e => e.d === dateStr && e.r)
        );
        const dayLbl = dayNames[dow];

        const col = mk("div","");
        col.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:6px;";

        // Circle
        const circle = mk("div","");
        let bg, checkmark;
        if(hasWorkout && !isFuture){
          bg = "#a8b5a0"; checkmark = true;
        } else if(isToday){
          bg = "var(--card)"; checkmark = false;
        } else if(isFuture){
          bg = "var(--bg3)"; checkmark = false;
        } else {
          bg = "var(--bg2)"; checkmark = false;
        }

        circle.style.cssText = "width:36px;height:36px;border-radius:50%;background:"+bg+";"+(isToday?"border:2px solid var(--navy);":"")+"display:flex;align-items:center;justify-content:center;";
        if(checkmark){
          circle.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16"><polyline points="3,8 6.5,12 13,4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        } else {
          const numEl = mk("span","");
          numEl.style.cssText = "font-size:13px;font-weight:600;color:"+(isToday?"var(--navy)":"var(--text3)")+";font-family:'Neue Montreal','DM Sans',sans-serif;";
          numEl.textContent = dateNum;
          circle.appendChild(numEl);
        }

        // Day letter
        const lbl = mk("div","");
        lbl.style.cssText = "font-size:10px;color:"+(isToday?"var(--navy)":"var(--text3)")+";font-weight:"+(isToday?"700":"400")+";font-family:'Neue Montreal','DM Sans',sans-serif;letter-spacing:0.5px;";
        lbl.textContent = dayLbl;

        col.appendChild(circle);
        col.appendChild(lbl);

        // Click to navigate to that day's workout
        col.style.cursor = "pointer";
        ((_d)=>{
          col.onclick = ()=>{
            const targetDate = _d.toISOString().split("T")[0];
            const targetDow = _d.getDay(); // 0=Sun,1=Mon...6=Sat
            // Map to DAYS array: Mon=0,Tue=1,Wed=2,Thu=3,Fri=4
            // For weekends use closest weekday: Sat->Fri(4), Sun->Mon(0)
            let dayIdx;
            if(targetDow === 0) dayIdx = 0;       // Sun -> show Mon
            else if(targetDow === 6) dayIdx = 4;  // Sat -> show Fri
            else dayIdx = targetDow - 1;           // Mon-Fri -> 0-4
            S.day = dayIdx;
            S.date = targetDate;
            S.sel = (S.dayEx[DAYS[dayIdx].f]||[])[0]||null;
            S.picker = false;
            S.manualDay = true;
            calendarOpen = false;
            const cal = document.getElementById("week-calendar");
            if(cal) cal.remove();
            renderLogPage();
          };
        })(d);

        cal.appendChild(col);
      });

      // Insert after header
      const header = document.getElementById("header");
      header.parentNode.insertBefore(cal, header.nextSibling);
    }
  } else {
    if(cal) cal.remove();
  }
}
